PROMPT 0
TIMEOUT 50
DEFAULT orionos

LABEL orionos
    MENU LABEL OrionOS
    LINUX boot/x86_64/vmlinuz-linux
    INITRD boot/intel-ucode.img,boot/amd-ucode.img,boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=arch archisolabel=ORIONOS_202607 cow_spacesize=10G

LABEL orionos-nvidia
    MENU LABEL OrionOS (NVIDIA)
    LINUX boot/x86_64/vmlinuz-linux
    INITRD boot/intel-ucode.img,boot/amd-ucode.img,boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=arch archisolabel=ORIONOS_202607 cow_spacesize=10G nvidia-drm.modeset=1 modprobe.blacklist=nouveau

LABEL orionos-safemode
    MENU LABEL OrionOS (Safe Mode)
    LINUX boot/x86_64/vmlinuz-linux
    INITRD boot/intel-ucode.img,boot/amd-ucode.img,boot/x86_64/initramfs-linux.img
    APPEND archisobasedir=arch archisolabel=ORIONOS_202607 nomodeset
