# OrionOS Live environment airootfs

## System Configuration
- Hostname: orionos
- Locale: en_US.UTF-8
- Timezone: UTC (user selects during install)
- Shell: bash (live), zsh available

## Enabled Services
- NetworkManager
- Bluetooth
- systemd-timesyncd
- sshd (live only)

## Default User
- Username: orion
- Password: orion (live only, must change on install)

## Desktop Environment
- Hyprland (Wayland compositor)
- Waybar (status bar)
- Wofi (application launcher)
- Kitty (terminal)
- Dunst (notifications)
- Calamares (installer)
