# OrionOS GRUB Configuration

set default=0
set timeout=5
set gfxmode=auto

insmod all_video
insmod gfxterm

terminal_output gfxterm

# Colors
set menu_color_normal=cyan/black
set menu_color_highlight=white/blue

menuentry "OrionOS" {
    linux /boot/vmlinuz-linux archisobasedir=arch archisolabel=ORIONOS_202607 quiet
    initrd /boot/intel-ucode.img /boot/amd-ucode.img /boot/initramfs-linux.img
}

menuentry "OrionOS (NVIDIA)" {
    linux /boot/vmlinuz-linux archisobasedir=arch archisolabel=ORIONOS_202607 quiet nvidia-drm.modeset=1 modprobe.blacklist=nouveau
    initrd /boot/intel-ucode.img /boot/amd-ucode.img /boot/initramfs-linux.img
}

menuentry "OrionOS (Safe Mode)" {
    linux /boot/vmlinuz-linux archisobasedir=arch archisolabel=ORIONOS_202607 nomodeset
    initrd /boot/intel-ucode.img /boot/amd-ucode.img /boot/initramfs-linux.img
}

menuentry "OrionOS (RAM Test)" {
    linux /boot/vmlinuz-linux archisobasedir=arch archisolabel=ORIONOS_202607 memtest86+
    initrd /boot/intel-ucode.img /boot/amd-ucode.img /boot/initramfs-linux.img
}
