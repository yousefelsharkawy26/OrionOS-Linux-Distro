{
    "auto_detect": true,
    "default_profile": "gaming",
    "monitor_interval": 2.0,
    "display_directories": [
        "/sys/class/drm",
        "/sys/class/backlight",
        "/sys/class/leds"
    ],
    "ignore_displays": ["eDP-1"],
    "hdr_support": true,
    "vrr_support": true,
    "color_management": true,
    "ambient_light_adaptation": true
}
