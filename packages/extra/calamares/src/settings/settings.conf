# OrionOS Calamares Settings
# Main configuration file for OrionOS installer

# General settings
sequence:
  - show:
    - welcome
    - locale
    - keyboard
    - partition
    - users
    - summary
  - exec:
    - orionos-install
  - show:
    - finished

# Branding
branding: orionos

# Interface settings
prompt-install: false
dont-chroot: false
oem-setup: false

# Debug settings
debug: false
testing: false

# Modules directory
modules-search:
  - /usr/share/calamares/modules
  - /usr/lib/calamares/modules
