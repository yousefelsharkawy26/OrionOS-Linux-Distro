# OrionOS Partition Module Configuration
# Custom partitioning for OrionOS with Btrfs

- name: partition
  type: partition
  
  # Partitioning scheme
  scheme:
    - name: efi
      filesystem: fat32
      size: 512
      mountPoint: /boot/efi
      flags: [boot, esp]
      
    - name: swap
      filesystem: linuxswap
      size: 8192  # 8GB
      
    - name: root
      filesystem: btrfs
      size: 0     # Use remaining space
      mountPoint: /
      btrfs:
        subvolumes:
          - name: @
            mountPoint: /
          - name: @home
            mountPoint: /home
          - name: @var
            mountPoint: /var
          - name: @tmp
            mountPoint: /tmp
          - name: @snapshots
            mountPoint: /.snapshots
  
  # Default filesystem
  defaultFileSystemType: btrfs
  
  # Btrfs options
  btrfsOptions:
    - compress=zstd:3
    - noatime
    - space_cache=v2
    - ssd
  
  # Encryption
  enableLuks: true
  luksKeyFile: /crypto_keyfile.bin
  
  # Bootloader
  bootloader: grub
  efiBootloaderId: OrionOS
  
  # Partition flags
  drawNestedPartitions: true
  alwaysShowPartitionLabels: true
