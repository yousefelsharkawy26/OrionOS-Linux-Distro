{
    "default_runtime": "podman",
    "rootless": true,
    "auto_update": true,
    "auto_update_interval_hours": 24,
    "enable_docker": true,
    "enable_podman": true,
    "enable_distrobox": true,
    "enable_buildah": true,
    "enable_skopeo": true,
    "registry_mirrors": {
        "docker.io": "mirror.gcr.io",
        "quay.io": "quay-mirror.orionos.org"
    },
    "default_network": "podman",
    "dns_servers": ["1.1.1.1", "8.8.8.8"],
    "log_driver": "json-file",
    "log_max_size": "10m",
    "log_max_files": 3,
    "storage_driver": "overlay",
    "volumes_dir": "/var/lib/orionos/containers/volumes",
    "apps_dir": "/usr/lib/orionos/distrobox/apps"
}
