{
    "default_backend": "sunshine",
    "auto_start_server": false,
    "auto_optimize_network": true,
    "default_resolution": "1920x1080",
    "default_fps": 60,
    "default_bitrate": "auto",
    "hardware_encoding": true,
    "encoder": "auto",
    "audio_codec": "opus",
    "video_codec": "h264",
    "enable_hdr_streaming": false,
    "enable_vrr_streaming": true,
    "enable_voice_chat": true,
    "enable_controller": true,
    "network_optimization": true,
    "quality_adjustment": "auto",
    "max_bandwidth_mbps": 100,
    "log_file": "/var/log/orionos/cloud-gaming.log"
}
