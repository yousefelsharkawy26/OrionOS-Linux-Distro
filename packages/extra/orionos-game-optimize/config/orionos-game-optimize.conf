{
    "auto_detect": true,
    "default_profile": "gaming",
    "monitor_interval": 1.0,
    "game_directories": [
        "/home/user/Games",
        "/usr/share/games",
        "/opt/steam",
        "/home/user/.local/share/Steam/steamapps/common",
        "/home/user/.steam/steam/steamapps/common"
    ],
    "ignore_processes": ["steam", "lutris", "heroic", "gamescope", "mangohud"],
    "gpu_power_management": true,
    "cpu_performance_mode": true,
    "io_optimization": true,
    "network_optimization": true,
    "audio_optimization": true
}
